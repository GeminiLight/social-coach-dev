<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SocialCoach logo</title>
  <desc id="desc">A coaching-loop S monogram for SocialCoach.</desc>
  <defs>
    <linearGradient id="bg" x1="78" y1="48" x2="434" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".58" stop-color="#eef8f4"/>
      <stop offset="1" stop-color="#dfe8ec"/>
    </linearGradient>
    <linearGradient id="loop" x1="108" y1="120" x2="408" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11c6bb"/>
      <stop offset=".5" stop-color="#008f8b"/>
      <stop offset="1" stop-color="#24416f"/>
    </linearGradient>
    <linearGradient id="signal" x1="180" y1="140" x2="334" y2="374" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111318"/>
      <stop offset=".56" stop-color="#16263d"/>
      <stop offset="1" stop-color="#253a76"/>
    </linearGradient>
    <filter id="softShadow" x="48" y="52" width="416" height="408" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#142028" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="112" fill="url(#bg)"/>
  <rect x="20.5" y="20.5" width="471" height="471" rx="111.5" fill="none" stroke="#ffffff" stroke-opacity=".86"/>

  <g filter="url(#softShadow)">
    <path d="M360 143c-40-38-104-49-160-25-77 33-113 122-80 200 33 79 126 116 202 80 37-17 67-47 83-83"
      fill="none" stroke="url(#loop)" stroke-width="40" stroke-linecap="round"/>
    <path d="M323 169c-31-27-85-29-119 1-37 32-20 74 53 91 68 16 87 57 49 93-36 34-101 29-138-12"
      fill="none" stroke="#ffffff" stroke-opacity=".92" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M323 169c-31-27-85-29-119 1-37 32-20 74 53 91 68 16 87 57 49 93-36 34-101 29-138-12"
      fill="none" stroke="url(#signal)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="360" cy="143" r="27" fill="#fff"/>
    <circle cx="360" cy="143" r="13" fill="#11c6bb"/>
    <circle cx="120" cy="318" r="27" fill="#fff"/>
    <circle cx="120" cy="318" r="13" fill="#5fe4ce"/>
    <circle cx="405" cy="315" r="27" fill="#fff"/>
    <circle cx="405" cy="315" r="13" fill="#253a76"/>

    <circle cx="256" cy="272" r="21" fill="#fff" opacity=".95"/>
    <circle cx="256" cy="272" r="8" fill="#008f8b"/>
  </g>
